name: Build & Release darkOS

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. 1.0.0)'
        required: true
        default: '1.0.0'

jobs:
  build-pc:
    name: Build PC Image (x86_64)
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y live-build debootstrap dosfstools squashfs-tools \
            xorriso grub-efi-amd64-bin mtools debian-archive-keyring zstd \
            syslinux-utils

      - name: Build PC ISO
        run: |
          # Wrap isohybrid to not fail on EFI-only ISOs
          sudo mv /usr/bin/isohybrid /usr/bin/isohybrid.real 2>/dev/null || true
          sudo tee /usr/bin/isohybrid > /dev/null <<'WRAP'
          #!/bin/sh
          /usr/bin/isohybrid.real "$@" 2>/dev/null || true
          WRAP
          sudo chmod +x /usr/bin/isohybrid
          sudo ./scripts/build-pc.sh

      - name: Compress ISO
        run: |
          cd build
          sudo zstd -T0 --fast darkOS-1.0-pc.iso -o darkOS-1.0-pc.iso.zst
          sudo sh -c 'sha256sum darkOS-1.0-pc.iso.zst > darkOS-1.0-pc.iso.zst.sha256'
          sudo chmod 644 *.zst *.sha256

      - name: Upload PC artifacts
        uses: actions/upload-artifact@v4
        with:
          name: darkos-pc
          path: |
            build/darkOS-1.0-pc.iso.zst
            build/darkOS-1.0-pc.iso.zst.sha256
          retention-days: 1

  build-rpi:
    name: Build RPi Image (ARM64)
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y debootstrap qemu-user-static binfmt-support \
            parted dosfstools e2fsprogs debian-archive-keyring zstd

      - name: Build RPi image
        run: sudo ./scripts/build-rpi.sh

      - name: Compress RPi image
        run: |
          cd build
          sudo zstd -T0 --fast darkOS-1.0-rpi.img -o darkOS-1.0-rpi.img.zst
          sudo sh -c 'sha256sum darkOS-1.0-rpi.img.zst > darkOS-1.0-rpi.img.zst.sha256'
          sudo chmod 644 *.zst *.sha256

      - name: Upload RPi artifacts
        uses: actions/upload-artifact@v4
        with:
          name: darkos-rpi
          path: |
            build/darkOS-1.0-rpi.img.zst
            build/darkOS-1.0-rpi.img.zst.sha256
          retention-days: 1

  build-vm:
    name: Build VM Images (VirtualBox + VMware)
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc
          sudo apt-get autoremove -y
          df -h /

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y debootstrap qemu-utils parted dosfstools \
            e2fsprogs grub-efi-amd64-bin grub-efi-amd64-signed debian-archive-keyring zstd

      - name: Build VM images
        run: sudo ./scripts/build-vm.sh

      - name: Compress VM images
        run: |
          cd build
          sudo zstd -T0 --fast darkOS-1.0-vm.ova -o darkOS-1.0-vm.ova.zst
          sudo zstd -T0 --fast darkOS-1.0-vm.vmdk -o darkOS-1.0-vm.vmdk.zst
          sudo sh -c 'sha256sum darkOS-1.0-vm.ova.zst > darkOS-1.0-vm.ova.zst.sha256'
          sudo sh -c 'sha256sum darkOS-1.0-vm.vmdk.zst > darkOS-1.0-vm.vmdk.zst.sha256'
          sudo chmod 644 *.zst *.sha256

      - name: Upload VM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: darkos-vm
          path: |
            build/darkOS-1.0-vm.ova.zst
            build/darkOS-1.0-vm.ova.zst.sha256
            build/darkOS-1.0-vm.vmdk.zst
            build/darkOS-1.0-vm.vmdk.zst.sha256
          retention-days: 1

  release:
    name: Create GitHub Release
    needs: [build-pc, build-rpi, build-vm]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          mkdir -p release
          cp artifacts/darkos-pc/* release/
          cp artifacts/darkos-rpi/* release/
          cp artifacts/darkos-vm/* release/
          ls -lh release/

      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=v${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
            echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "darkOS ${{ steps.version.outputs.version }}"
          body: |
            ## darkOS ${{ steps.version.outputs.version }}

            A developer-first Linux distro with built-in AI.

            ### Downloads

            | Platform | File | Description |
            |:---|:---|:---|
            | PC (x86_64) | `darkOS-1.0-pc.iso.zst` | Bootable USB — decompress with `zstd -d`, flash with `dd` or Etcher |
            | Raspberry Pi 4 | `darkOS-1.0-rpi.img.zst` | SD card image — decompress, flash with RPi Imager |
            | VirtualBox | `darkOS-1.0-vm.ova.zst` | Import with File > Import Appliance |
            | VMware | `darkOS-1.0-vm.vmdk.zst` | Use as existing disk when creating a VM |

            ### Install

            ```bash
            # Decompress (all platforms)
            zstd -d <file>.zst

            # PC — flash to USB
            sudo dd if=darkOS-1.0-pc.iso of=/dev/sdX bs=4M status=progress

            # Raspberry Pi 4 — flash to SD
            sudo dd if=darkOS-1.0-rpi.img of=/dev/sdX bs=4M status=progress

            # VirtualBox — File > Import Appliance > darkOS-1.0-vm.ova
            # VMware — Create New VM > Use existing disk > darkOS-1.0-vm.vmdk
            ```

            ### Default credentials
            - **User:** `darkvus`
            - **Password:** `darkos`

            ### What's included
            - KDE Plasma desktop (macOS style) — adapts to available RAM
            - Ollama with auto-detected AI model
            - Python 3, VSCode, Chrome, Node.js, Git
            - SSH enabled by default
            - VM guest additions (VirtualBox + VMware Tools)

            ### Verify downloads
            ```bash
            sha256sum -c *.sha256
            ```
          files: |
            release/*
          draft: false
          prerelease: false
